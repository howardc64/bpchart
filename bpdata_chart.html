<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood Pressure Chart</title>
<style>
  body { margin: 0; font-family: Arial, sans-serif; background: #faf8f4; }
  .wrapper { max-width: 980px; margin: 0 auto; padding: 28px 24px 24px; }
  .chart-box { position: relative; width: 100%; height: 480px; }
  .legend {
    display: flex; flex-wrap: wrap; gap: 20px;
    margin-top: 14px; font-size: 12px; color: #555;
    justify-content: center; align-items: center;
  }
  .leg-item { display: flex; align-items: center; gap: 5px; }
  .sw-line { display:inline-block; width:28px; height:3px; border-radius:2px; }
  .sw-dot  { display:inline-block; width:10px; height:10px; border-radius:50%; }
  .sw-dash { display:inline-block; width:0; height:14px; border-left:2px dashed #888; }
</style>
</head>
<body>
<div class="wrapper">
  <div class="chart-box">
    <canvas id="bpChart"
      role="img"
      aria-label="Blood pressure scatter chart with systolic and diastolic trends and medication annotations">
      Systolic and diastolic blood pressure readings over time with medication period labels.
    </canvas>
  </div>
  <div class="legend">
    <span class="leg-item"><span class="sw-line" style="background:#b53030;"></span> Systolic trend</span>
    <span class="leg-item"><span class="sw-dot"  style="background:rgba(200,80,80,0.5);"></span> Systolic reading</span>
    <span class="leg-item"><span class="sw-line" style="background:#2a6fa8;"></span> Diastolic trend</span>
    <span class="leg-item"><span class="sw-dot"  style="background:rgba(60,130,200,0.45);"></span> Diastolic reading</span>
    <span class="leg-item"><span class="sw-dash"></span> Medication change</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const RAW   = [[1754809200000, 142, 91], [1754895600000, 133, 90], [1755327600000, 141, 88], [1755414000000, 139, 96], [1755586800000, 141, 85], [1755673200000, 144, 94], [1755759600000, 140, 91], [1755932400000, 129, 84], [1755932400000, 128, 83], [1756018800000, 152, 93], [1756018800000, 130, 86], [1756105200000, 132, 84], [1756191600000, 133, 88], [1756623600000, 124, 84], [1756710000000, 131, 87], [1756882800000, 119, 83], [1756882800000, 128, 88], [1756969200000, 124, 86], [1756969200000, 123, 86], [1757055600000, 124, 83], [1757660400000, 111, 83], [1757660400000, 107, 70], [1757746800000, 120, 77], [1757746800000, 108, 74], [1757833200000, 111, 74], [1757833200000, 114, 75], [1757919600000, 116, 77], [1757919600000, 113, 73], [1758006000000, 108, 74], [1758006000000, 100, 63], [1758092400000, 120, 81], [1758092400000, 110, 69], [1758178800000, 118, 79], [1758265200000, 119, 76], [1758351600000, 118, 76], [1758351600000, 113, 76], [1759215600000, 123, 83], [1759215600000, 117, 79], [1759302000000, 113, 76], [1759302000000, 129, 81], [1759388400000, 127, 81], [1759388400000, 112, 76], [1759388400000, 112, 75], [1759474800000, 127, 83], [1759474800000, 118, 81], [1759474800000, 123, 77], [1759647600000, 109, 74], [1759647600000, 109, 70], [1759647600000, 111, 73], [1759647600000, 108, 78], [1759734000000, 121, 78], [1759734000000, 122, 82], [1759734000000, 121, 84], [1759734000000, 118, 79], [1759820400000, 128, 78], [1759820400000, 132, 84], [1759820400000, 122, 76], [1759820400000, 120, 75], [1759906800000, 129, 81], [1759906800000, 113, 73], [1759993200000, 127, 90], [1759993200000, 128, 84], [1759993200000, 135, 86], [1759993200000, 112, 77], [1759993200000, 129, 82], [1759993200000, 116, 73], [1760079600000, 121, 86], [1760079600000, 133, 84], [1760079600000, 106, 78], [1760166000000, 117, 77], [1760166000000, 121, 76], [1760166000000, 103, 70], [1760338800000, 115, 74], [1760338800000, 116, 71], [1760425200000, 120, 74], [1760425200000, 104, 69], [1760511600000, 112, 73], [1760511600000, 117, 69], [1760598000000, 117, 74], [1760684400000, 128, 86], [1760770800000, 118, 79], [1760857200000, 115, 81], [1760857200000, 118, 73], [1760943600000, 114, 72], [1761030000000, 121, 81], [1761030000000, 114, 74], [1761202800000, 135, 88], [1761375600000, 109, 70], [1761375600000, 111, 70], [1761634800000, 106, 66], [1761807600000, 110, 71], [1761894000000, 114, 76], [1762156800000, 118, 75], [1763107200000, 125, 75], [1763452800000, 111, 74], [1763452800000, 113, 76], [1763539200000, 111, 73], [1763539200000, 124, 82], [1763625600000, 114, 72], [1763798400000, 116, 76], [1763798400000, 129, 83], [1763971200000, 111, 76], [1763971200000, 131, 87], [1764403200000, 119, 77], [1764489600000, 124, 84], [1764576000000, 122, 79], [1764662400000, 113, 70], [1764835200000, 115, 78], [1764921600000, 110, 70], [1765094400000, 130, 81], [1765180800000, 120, 76], [1765267200000, 112, 81], [1766044800000, 125, 86], [1766044800000, 134, 88], [1766217600000, 113, 77], [1766304000000, 121, 84], [1766822400000, 135, 92], [1766908800000, 119, 84], [1766908800000, 128, 86], [1767427200000, 122, 80], [1767513600000, 121, 82], [1767686400000, 116, 79], [1768204800000, 107, 68], [1768550400000, 122, 79], [1768982400000, 131, 82], [1768982400000, 131, 87], [1769241600000, 120, 78], [1770019200000, 124, 84], [1770105600000, 121, 84], [1770105600000, 128, 81], [1770192000000, 138, 94], [1770364800000, 134, 86], [1770364800000, 131, 87], [1770451200000, 135, 85], [1770624000000, 131, 85], [1770710400000, 122, 86], [1770883200000, 132, 85], [1770969600000, 131, 80], [1771056000000, 124, 84], [1771142400000, 136, 90], [1771228800000, 141, 99], [1771315200000, 121, 81], [1771401600000, 144, 95], [1771833600000, 121, 80], [1771833600000, 124, 79], [1771920000000, 126, 78], [1772006400000, 133, 88], [1772179200000, 141, 92], [1772265600000, 138, 88], [1772438400000, 131, 90], [1772524800000, 124, 81], [1774767600000, 133, 91], [1774767600000, 133, 87], [1774940400000, 136, 88], [1774940400000, 126, 89], [1775026800000, 156, 103], [1775113200000, 143, 92], [1775113200000, 146, 93], [1775113200000, 142, 94], [1775199600000, 142, 86], [1775286000000, 133, 89], [1775458800000, 143, 94], [1775458800000, 137, 90], [1775545200000, 139, 93], [1775545200000, 139, 93], [1775631600000, 122, 75], [1775718000000, 120, 83], [1775977200000, 119, 78], [1776927600000, 129, 85], [1777446000000, 119, 75], [1777618800000, 121, 84]];
const MEDS  = [{"start": 1754809200000, "end": 1759302000000, "lines": ["Lisinopril-HCTZ", "10-12.5mg \u00bdtab"]}, {"start": 1759388400000, "end": 1768809600000, "lines": ["Lisinopril 5mg"]}, {"start": 1768896000000, "end": 1775545200000, "lines": ["Losartan 25mg"]}, {"start": 1775631600000, "end": 1778912331558, "lines": ["Losartan 50mg"]}];
const MIN_X = 1754636400000;
const MAX_X = 1778050800000;

function loess(xs, ys, bw) {
  return xs.map(x0 => {
    let sw=0, swx=0, swy=0, swxx=0, swxy=0;
    xs.forEach((x, j) => {
      const w = Math.exp(-0.5 * ((x - x0) / bw) ** 2);
      sw+=w; swx+=w*x; swy+=w*ys[j]; swxx+=w*x*x; swxy+=w*x*ys[j];
    });
    const det = sw*swxx - swx*swx;
    if (Math.abs(det) < 1e-10) return swy / sw;
    return ((swxx*swy - swx*swxy) + (sw*swxy - swx*swy)*x0) / det;
  });
}

const xs = RAW.map(r => r[0]);
const bw = (xs[xs.length-1] - xs[0]) * 0.09;
const sysTrend = loess(xs, RAW.map(r=>r[1]), bw);
const diaTrend = loess(xs, RAW.map(r=>r[2]), bw);
const medBounds = MEDS.slice(1).map(m => m.start);

const medPlugin = {
  id: 'medPlugin',
  afterDraw(chart) {
    const {ctx, chartArea, scales: {x}} = chart;
    ctx.save();
    medBounds.forEach(t => {
      const px = x.getPixelForValue(t);
      if (px < chartArea.left || px > chartArea.right) return;
      ctx.beginPath();
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = 'rgba(100,100,100,0.65)';
      ctx.lineWidth = 1.5;
      ctx.moveTo(px, chartArea.top);
      ctx.lineTo(px, chartArea.bottom);
      ctx.stroke();
      ctx.setLineDash([]);
    });
    ctx.font = '10.5px Arial, sans-serif';
    ctx.fillStyle = '#333';
    ctx.textBaseline = 'top';
    const labelY = chartArea.top + 6;
    MEDS.forEach(m => {
      const x1 = Math.max(x.getPixelForValue(m.start), chartArea.left);
      const x2 = Math.min(x.getPixelForValue(m.end),   chartArea.right);
      if (x2 - x1 < 5) return;
      ctx.save();
      ctx.beginPath();
      ctx.rect(x1, labelY, x2 - x1, 32);
      ctx.clip();
      m.lines.forEach((line, i) => ctx.fillText(line, x1 + 4, labelY + i * 13));
      ctx.restore();
    });
    ctx.restore();
  }
};
Chart.register(medPlugin);

new Chart(document.getElementById('bpChart'), {
  type: 'scatter',
  data: {
    datasets: [
      {
        label: 'Systolic reading',
        data: RAW.map(r => ({x: r[0], y: r[1]})),
        backgroundColor: 'rgba(200,80,80,0.4)',
        pointRadius: 4.5, showLine: false, order: 2
      },
      {
        label: 'Systolic trend',
        data: RAW.map((r,i) => ({x: r[0], y: sysTrend[i]})),
        borderColor: '#b53030', borderWidth: 2.5,
        backgroundColor: 'transparent', pointRadius: 0,
        showLine: true, tension: 0.4, order: 1
      },
      {
        label: 'Diastolic reading',
        data: RAW.map(r => ({x: r[0], y: r[2]})),
        backgroundColor: 'rgba(60,130,200,0.38)',
        pointRadius: 4.5, showLine: false, order: 2
      },
      {
        label: 'Diastolic trend',
        data: RAW.map((r,i) => ({x: r[0], y: diaTrend[i]})),
        borderColor: '#2a6fa8', borderWidth: 2.5,
        backgroundColor: 'transparent', pointRadius: 0,
        showLine: true, tension: 0.4, order: 1
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    animation: false,
    plugins: {
      legend: {display: false},
      tooltip: {
        filter: item => !item.dataset.label.includes('trend'),
        callbacks: {
          title: items => new Date(items[0].parsed.x).toLocaleDateString('en-US',
            {month:'short', day:'numeric', year:'2-digit'}),
          label: ctx => ctx.dataset.label + ': ' + Math.round(ctx.parsed.y)
        }
      }
    },
    scales: {
      x: {
        type: 'linear', min: MIN_X, max: MAX_X,
        ticks: {
          color: '#666', font: {size: 11},
          maxRotation: 0, maxTicksLimit: 9,
          callback: val => new Date(val).toLocaleDateString('en-US',
            {month:'short', day:'numeric', year:'2-digit'})
        },
        grid: {color: 'rgba(0,0,0,0.1)', lineWidth: 1},
        border: {display: false}
      },
      y: {
        min: 55, max: 170,
        ticks: {color: '#666', font: {size: 11}, stepSize: 10},
        grid: {color: 'rgba(0,0,0,0.1)', lineWidth: 1},
        border: {display: false},
        title: {display: true, text: 'mmHg', color: '#666', font: {size: 12}}
      }
    },
    layout: {padding: {top: 10, bottom: 10, left: 0, right: 10}}
  }
});
</script>
</body>
</html>
